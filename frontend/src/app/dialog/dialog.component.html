<h2 mat-dialog-title>{{ data.title }}</h2>
<mat-dialog-content>
  <mat-form-field>
    <mat-label>{{ data.placeholder || 'Enter text...' }}</mat-label>
    <textarea matInput [formField]="form.bodyText"></textarea>
  </mat-form-field>
</mat-dialog-content>

<mat-dialog-actions>
  <button matButton [mat-dialog-close]="null">Cancel</button>
  <button matButton (click)="submit()" [disabled]="!form.bodyText().dirty()" cdkFocusInitial>
    Submit
  </button>
</mat-dialog-actions>
